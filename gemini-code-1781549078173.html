<script>
try {
const { useState, useEffect, useRef } = React;
const { ResponsiveContainer, ComposedChart, Line, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = Recharts;

// Global constants & formatting tools
const CURRENT_YEAR = 2026;
const C = {
  bg: "#F7F6F3",
  surface: "#FFFFFF",
  border: "#EAE8E3",
  text: "#37352F",
  muted: "#6B6860",
  accent: "#2C5F8A",
  accentLight: "#F0F4F8",
  pot: "#4A90E2",
  isa: "#50E3C2",
  savings: "#F5A623",
  sp: "#7ED321",
  spending: "#E15B64",
  danger: "#D9534F"
};

const DEFAULTS = {
  age1: 48, age2: 48, retireAge: 55, lifeExpectancy: 90,
  pot: 750000, potGrow: 5, potContrib: 15000,
  isa: 120000, isaGrow: 4, isaContrib: 10000,
  savings: 40000, savingsGrow: 3,
  living: 40000, inflation: 2.5,
  sp1: 11500, sp2: 11500,
  aptCost: 4000, careStartAge: 80, careCost: 12000,
  flexTravel: true
};

const PRESETS = [
  { id: "s4", name: "Antarctica Cruise", emoji: "🧊", tier: "💜 Luxury", est: 28000, notes: "Book 12-18 months ahead" },
  { id: "s8", name: "Alaska Wilderness", emoji: "🐻", tier: "🧡 Premium", est: 13000, notes: "Denali & Glacier Bay" },
  { id: "s5", name: "Amalfi Coast, Italy", emoji: "🌊", tier: "💛 Mid-range", est: 6500, notes: "Positano & Capri" },
  { id: "s1", name: "China Multi-City", emoji: "🇨🇳", tier: "🧡 Premium", est: 9000, notes: "Beijing, Chengdu, Xi'an" },
  { id: "s2", name: "Spain Road Trip", emoji: "🇪🇸", tier: "💛 Mid-range", est: 5000, notes: "Barcelona, Madrid, Murcia" }
];

const fmt = v => "£" + Math.round(v).toLocaleString("en-GB");
const fmtK = v => "£" + Math.round(v / 1000) + "k";

function loadState() {
  try { return JSON.parse(localStorage.getItem("ret_planner_v10")); } catch(e) { return null; }
}

function saveState(s, t) {
  try {
    localStorage.setItem("ret_planner_v10", JSON.stringify({ settings: s, trips: t }));
    const toast = document.getElementById("save-toast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1500);
  } catch(e) {}
}

// Reusable custom UI components
function SectionTitle({ children }) {
  return React.createElement("h3", { style: { fontSize: 13, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 10 } }, children);
}

function Divider() {
  return React.createElement("div", { style: { height: 1, background: C.border, margin: "20px 0" } });
}

function MetricCard({ label, value, color }) {
  return React.createElement("div", { style: { background: C.surface, padding: "12px 14px", borderRadius: 10, border: `1px solid ${C.border}` } },
    React.createElement("div", { style: { fontSize: 11, color: C.muted, marginBottom: 2 } }, label),
    React.createElement("div", { style: { fontSize: 18, fontWeight: 700, color: color || C.text } }, value)
  );
}

function InputField({ label, value, onChange, type = "number", suffix = "" }) {
  return React.createElement("div", { style: { marginBottom: 12 } },
    React.createElement("label", { style: { display: "block", fontSize: 13, color: C.text, marginBottom: 4, fontWeight: 500 } }, label),
    React.createElement("div", { style: { position: "relative" } },
      React.createElement("input", { type, value, onChange: e => onChange(type === "number" ? parseFloat(e.target.value) || 0 : e.target.value), style: { width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 14, outline: "none", color: C.text } }),
      suffix && React.createElement("span", { style: { position: "absolute", right: 12, top: 10, fontSize: 13, color: C.muted } }, suffix)
    )
  );
}

function Grid({ children, cols = 2 }) {
  return React.createElement("div", { style: { display: "grid", gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))`, gap: 12 } }, children);
}

// Main App Component
function App() {
  const saved = loadState();
  const [s, setS] = useState(saved?.settings || DEFAULTS);
  const [trips, setTrips] = useState(saved?.trips || []);
  const [tab, setTab] = useState("Inputs");

  // Trip form state
  const [form, setForm] = useState({ name: "", est: 5000, year: CURRENT_YEAR + 1, tier: "💛 Mid-range", notes: "" });

  useEffect(() => {
    saveState(s, trips);
  }, [s, trips]);

  const updateSetting = key => val => setS(p => ({ ...p, [key]: val }));

  // Calculator core math loops
  const runProjection = () => {
    let pot = s.pot, isa = s.isa, savings = s.savings, reserve = 0;
    const records = [];
    const yearTotals = {};

    // Map year trip costs
    trips.forEach(t => { yearTotals[t.year] = (yearTotals[t.year] || 0) + t.est; });

    const totalYears = s.lifeExpectancy - s.age1;
    for (let i = 0; i <= totalYears; i++) {
      const age = s.age1 + i;
      const year = CURRENT_YEAR + i;
      const isRetired = age >= s.retireAge;
      const inf = Math.pow(1 + s.inflation / 100, i);

      // Pre-retirement accumulation
      if (!isRetired) {
        pot = (pot + s.potContrib) * (1 + s.potGrow / 100);
        isa = (isa + s.isaContrib) * (1 + s.isaGrow / 100);
        savings = savings * (1 + s.savingsGrow / 100);
      }

      // Compute travel parameters
      const baseTripTotal = yearTotals[year] || 0;
      let travelThisYear = baseTripTotal;
      let discountApplied = 0;

      if (s.flexTravel && isRetired && baseTripTotal > 0) {
        if (age >= 75) {
          travelThisYear = baseTripTotal * 0.5;
          discountApplied = 50;
        } else if (age >= 70) {
          travelThisYear = baseTripTotal * 0.75;
          discountApplied = 25;
        }
      }

      // Compute Care requirements
      const careCost = age >= s.careStartAge ? s.careCost : 0;
      const currentRequiredSpend = (s.living + travelThisYear + s.aptCost + careCost) * inf;

      // Incomes
      let pd = 0, id = 0, sd = 0;
      const sp1Active = age >= 67 ? s.sp1 * inf : 0;
      const sp2Active = (s.age2 + i) >= 67 ? s.sp2 * inf : 0;
      const statePensionTotal = sp1Active + sp2Active;

      let needed = Math.max(0, currentRequiredSpend - statePensionTotal);

      // Drawdown matrix hierarchy
      if (isRetired && needed > 0) {
        if (savings > 0) {
          const draw = Math.min(savings, needed);
          sd = draw; needed -= draw; savings -= draw;
        }
        if (needed > 0 && isa > 0) {
          const draw = Math.min(isa, needed);
          id = draw; needed -= draw; isa -= draw;
        }
        if (needed > 0 && pot > 0) {
          const draw = Math.min(pot, needed);
          pd = draw; needed -= draw; pot -= draw;
        }
      }

      // Post-retirement growth loops
      if (isRetired) {
        pot = pot * (1 + s.potGrow / 100);
        isa = isa * (1 + s.isaGrow / 100);
        savings = savings * (1 + s.savingsGrow / 100);
      }

      records.push({
        age, year, pot, isa, savings,
        spending: currentRequiredSpend,
        travel: travelThisYear * inf,
        statePension: statePensionTotal,
        drawdowns: pd + id + sd,
        shortfall: needed
      });
    }
    return { records, yearTotals };
  };

  const { records, yearTotals } = runProjection();
  const retYearData = records.find(r => r.age === s.retireAge) || records[0];
  const endYearData = records[records.length - 1];
  const finalShortfall = records.reduce((acc, r) => acc + r.shortfall, 0);

  return React.createElement("div", { style: { background: C.bg, minHeight: "100vh", color: C.text } },
    // Header Section Layout
    React.createElement("div", { style: { background: C.accent, padding: "20px 16px", color: "#fff" } },
      React.createElement("div", { style: { maxWidth: 720, margin: "0 auto" } },
        React.createElement("h2", { style: { fontSize: 20, fontWeight: 700 } }, "Retirement & Travel Planner"),
        React.createElement("div", { style: { fontSize: 12, opacity: 0.8, marginTop: 4 } }, "UK Portfolio Drawdowns & Dynamic Travel Optimization Layout")
      )
    ),

    // Navigation Tab Strip Layout
    React.createElement("div", { className: "tabs-strip", style: { maxWidth: 720, margin: "10px auto 0" } },
      ["Inputs", "Travel Dashboard", "Projections Timeline"].map(t => 
        React.createElement("button", { key: t, onClick: () => setTab(t), style: { padding: "8px 16px", borderRadius: 20, border: "none", background: tab === t ? C.accent : C.surface, color: tab === t ? "#fff" : C.muted, fontWeight: 600, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" } }, t)
      )
    ),

    // Inner Active Screen Rendering Core
    React.createElement("div", { style: { maxWidth: 720, margin: "0 auto", padding: "16px" } },
      tab === "Inputs" && React.createElement("div", { style: { background: C.surface, padding: "20px", borderRadius: 12, border: `1px solid ${C.border}` } },
        React.createElement(SectionTitle, null, "Biometric Profiles"),
        React.createElement(Grid, null,
          React.createElement(InputField, { label: "Your Current Age", value: s.age1, onChange: updateSetting("age1") }),
          React.createElement(InputField, { label: "Partner Age", value: s.age2, onChange: updateSetting("age2") })
        ),
        React.createElement(Grid, null,
          React.createElement(InputField, { label: "Target Retirement Age", value: s.retireAge, onChange: updateSetting("retireAge") }),
          React.createElement(InputField, { label: "Life Expectancy Cap", value: s.lifeExpectancy, onChange: updateSetting("lifeExpectancy") })
        ),
        React.createElement(Divider, null),
        React.createElement(SectionTitle, null, "Wealth Portfolios & Accumulation Contracts"),
        React.createElement(Grid, null,
          React.createElement(InputField, { label: "Pensions Value (£)", value: s.pot, onChange: updateSetting("pot") }),
          React.createElement(InputField, { label: "Annual Pension Top-up (£)", value: s.potContrib, onChange: updateSetting("potContrib") })
        ),
        React.createElement(Grid, null,
          React.createElement(InputField, { label: "ISA Balance (£)", value: s.isa, onChange: updateSetting("isa") }),
          React.createElement(InputField, { label: "Annual ISA Top-up (£)", value: s.isaContrib, onChange: updateSetting("isaContrib") })
        ),
        React.createElement(InputField, { label: "Cash Savings & Emergency Buffer (£)", value: s.savings, onChange: updateSetting("savings") }),
        React.createElement(Divider, null),
        React.createElement(SectionTitle, null, "Annual Expenditure & State Allocations"),
        React.createElement(Grid, null,
          React.createElement(InputField, { label: "UK Base Living Cost (£/yr)", value: s.living, onChange: updateSetting("living") }),
          React.createElement(InputField, { label: "Spain Maintenance Costs (£/yr)", value: s.aptCost, onChange: updateSetting("aptCost") })
        ),
        React.createElement(Grid, null,
          React.createElement(InputField, { label: "Your State Pension (£/yr)", value: s.sp1, onChange: updateSetting("sp1") }),
          React.createElement(InputField, { label: "Partner State Pension (£/yr)", value: s.sp2, onChange: updateSetting("sp2") })
        ),
        React.createElement(Divider, null),
        React.createElement(SectionTitle, null, "Advanced Later-Life Provisions"),
        React.createElement(Grid, null,
          React.createElement(InputField, { label: "Care Provision Start Age", value: s.careStartAge, onChange: updateSetting("careStartAge") }),
          React.createElement(InputField, { label: "Care Cost Allocation (£/yr)", value: s.careCost, onChange: updateSetting("careCost") })
        )
      ),

      tab === "Travel Dashboard" && React.createElement("div", null,
        // Active Optimization Controls Layout
        React.createElement("div", { style: { background: C.surface, padding: "16px", borderRadius: 12, border: `1px solid ${C.border}`, marginBottom: 16 } },
          React.createElement("label", { style: { display: "flex", alignItems: "center", gap: 10, cursor: "pointer" } },
            React.createElement("input", { type: "checkbox", checked: s.flexTravel, onChange: e => updateSetting("flexTravel")(e.target.checked), style: { width: 18, height: 18 } }),
            React.createElement("div", null,
              React.createElement("div", { style: { fontSize: 14, fontWeight: 600 } }, "Enable Dynamic Travel Cost Tapering"),
              React.createElement("div", { style: { fontSize: 12, color: C.muted } }, "Trims planned expedition budgets automatically by 25% at age 70, and 50% from age 75+")
            )
          )
        ),

        // Travel Add-Form Segment UI
        React.createElement("div", { style: { background: C.surface, padding: "16px", borderRadius: 12, border: `1px solid ${C.border}`, marginBottom: 16 } },
          React.createElement(SectionTitle, null, "Schedule Custom Expedition Itinerary"),
          React.createElement(Grid, null,
            React.createElement(InputField, { label: "Destination Name", type: "text", value: form.name, onChange: v => setForm(p => ({ ...p, name: v })) }),
            React.createElement(InputField, { label: "Estimated Cost (£)", value: form.est, onChange: v => setForm(p => ({ ...p, est: v })) })
          ),
          React.createElement(Grid, null,
            React.createElement(InputField, { label: "Target Calendar Year", value: form.year, onChange: v => setForm(p => ({ ...p, year: v })) }),
            React.createElement("div", { style: { marginBottom: 12 } },
              React.createElement("label", { style: { display: "block", fontSize: 13, color: C.text, marginBottom: 4, fontWeight: 500 } }, "Comfort Class Tier"),
              React.createElement("select", { value: form.tier, onChange: e => setForm(p => ({ ...p, tier: e.target.value })), style: { width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 14, background: "#fff", outline: "none" } },
                ["💛 Mid-range", "🧡 Premium", "💜 Luxury"].map(t => React.createElement("option", { key: t, value: t }, t))
              )
            )
          ),
          React.createElement("button", { 
            onClick: () => {
              if (!form.name) return;
              setTrips(p => [...p, { ...form, id: "trip_" + Date.now() }]);
              setForm({ name: "", est: 5000, year: CURRENT_YEAR + 1, tier: "💛 Mid-range", notes: "" });
            }, 
            style: { width: "100%", padding: "12px", background: C.accent, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", marginTop: 4 } 
          }, "Commit Trip to Financial Timeline"),

          // Presets / Recommendations Submodule Grid
          React.createElement("div", { style: { marginTop: 16 } },
            React.createElement("div", { style: { fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 8 } }, "Quick Add Target Expeditions:"),
            React.createElement("div", { style: { display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 } },
              PRESETS.map(p => React.createElement("button", {
                key: p.id,
                onClick: () => setTrips(prev => [...prev, { ...p, year: CURRENT_YEAR + 2, id: "preset_" + Date.now() }]),
                style: { padding: "6px 12px", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 16, fontSize: 12, whiteSpace: "nowrap", cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }
              }, `${p.emoji} ${p.name} (${fmtK(p.est)})`))
            )
          )
        ),

        // Scheduled Itineraries Output Table
        React.createElement("div", { style: { background: C.surface, padding: "16px", borderRadius: 12, border: `1px solid ${C.border}` } },
          React.createElement(SectionTitle, null, "Scheduled Expeditions Timeline Matrix"),
          trips.length === 0 ? React.createElement("div", { style: { textalign: "center", padding: "20px", color: C.muted, fontSize: 13 } }, "No itineraries added yet. Commit a trip above to chart it.") : 
          React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
            trips.sort((a,b) => a.year - b.year).map(t => React.createElement("div", { key: t.id, style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", background: C.bg, borderRadius: 8, border: `1px solid ${C.border}` } },
              React.createElement("div", null,
                React.createElement("div", { style: { fontSize: 14, fontWeight: 600 } }, `${t.emoji || "✈️"} ${t.name}`),
                React.createElement("div", { style: { fontSize: 12, color: C.muted } }, `Year: ${t.year} · Tier: ${t.tier}`)
              ),
              React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
                React.createElement("span", { style: { fontWeight: 700, color: C.accent } }, fmt(t.est)),
                React.createElement("button", { onClick: () => setTrips(p => p.filter(x => x.id !== t.id)), style: { border: "none", background: "transparent", color: C.danger, cursor: "pointer", fontSize: 16, fontWeight: "bold", padding: "4px" } }, "✕")
              )
            ))
          ),

          // Patched Sorting and Mapping Syntax Section
          React.createElement("div", { style: { marginTop: 20, borderTop: `1px solid ${C.border}`, paddingTop: 14 } },
            React.createElement("div", { style: { fontSize: 12, fontWeight: 700, color: C.muted, textTransform: "uppercase", marginBottom: 8 } }, "Trip spend by year Breakdown"),
            Object.entries(yearTotals)
              .sort((a, b) => Number(a[0]) - Number(b[0]))
              .map(([year, total]) => {
                return React.createElement("div", { key: year, style: { display: "flex", justifyContent: "space-between", fontSize: 13, padding: "4px 0" } },
                  React.createElement("span", null, `Year ${year}:`),
                  React.createElement("span", { style: { fontWeight: 600 } }, fmt(total))
                );
              })
          )
        )
      ),

      tab === "Projections Timeline" && React.createElement("div", null,
        // Macro Dashboard Result Scorecard Cards
        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 16 } },
          React.createElement(MetricCard, { label: "Wealth at Ret.", value: fmtK(retYearData.pot + retYearData.isa) }),
          React.createElement(MetricCard, { label: "End-Life Estate", value: fmtK(endYearData.pot + endYearData.isa), color: (endYearData.pot + endYearData.isa) > 0 ? C.sp : C.danger }),
          React.createElement(MetricCard, { label: "Total Shortfalls", value: fmt(finalShortfall), color: finalShortfall > 0 ? C.danger : C.sp })
        ),

        // Visualized Timeline Chart Container
        React.createElement("div", { style: { background: C.surface, padding: "16px", borderRadius: 12, border: `1px solid ${C.border}`, marginBottom: 16 } },
          React.createElement(SectionTitle, null, "Asset Breakdown & Capital Exhaustion Track"),
          React.createElement("div", { style: { width: "100%", height: 260, marginTop: 10 } },
            React.createElement(ResponsiveContainer, { width: "100%", height: "100%" },
              React.createElement(ComposedChart, { data: records, margin: { top: 5, right: 5, left: -20, bottom: 5 } },
                React.createElement(CartesianGrid, { strokeDasharray: "3 3" }),
                React.createElement(XAxis, { dataKey: "age", tick: { fontSize: 11 } }),
                React.createElement(YAxis, { tick: { fontSize: 11 } }),
                React.createElement(Tooltip, { formatter: (v) => fmt(v) }),
                React.createElement(Legend, { wrapperStyle: { fontSize: 11 } }),
                React.createElement(Bar, { dataKey: "pot", name: "Pension Pot", stackId: "a", fill: C.pot }),
                React.createElement(Bar, { dataKey: "isa", name: "ISA Account", stackId: "a", fill: C.isa }),
                React.createElement(Line, { type: "monotone", dataKey: "spending", name: "Inflation-Adj Spend", stroke: C.spending, strokeWidth: 2, dot: false })
              )
            )
          )
        ),

        // Iterative Chronological Row Ledger
        React.createElement("div", { style: { background: C.surface, padding: "16px", borderRadius: 12, border: `1px solid ${C.border}` } },
          React.createElement(SectionTitle, null, "Granular Chronological Ledger Output"),
          React.createElement("div", { style: { overflowX: "auto" } },
            React.createElement("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 12, textalign: "left" } },
              React.createElement("thead", null,
                React.createElement("tr", { style: { borderBottom: `2px solid ${C.border}`, color: C.muted } },
                  ["Age", "Year", "Pension Pot", "ISA Account", "Net Outflow", "Shortfall"].map(h => React.createElement("th", { key: h, style: { padding: "8px 4px", fontWeight: 600 } }, h))
                )
              ),
              React.createElement("tbody", null,
                records.filter((_, idx) => idx % 2 === 0).map(r => React.createElement("tr", { key: r.age, style: { borderBottom: `1px solid ${C.border}` } },
                  React.createElement("td", { style: { padding: "8px 4px" } }, r.age),
                  React.createElement("td", { style: { padding: "8px 4px", color: C.muted } }, r.year),
                  React.createElement("td", { style: { padding: "8px 4px", fontWeight: 500 } }, fmtK(r.pot)),
                  React.createElement("td", { style: { padding: "8px 4px", fontWeight: 500 } }, fmtK(r.isa)),
                  React.createElement("td", { style: { padding: "8px 4px", color: C.spending } }, fmt(r.spending)),
                  React.createElement("td", { style: { padding: "8px 4px", fontWeight: 600, color: r.shortfall > 0 ? C.danger : C.sp } }, r.shortfall > 0 ? fmt(r.shortfall) : "£0")
                ))
              )
            )
          )
        )
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

} catch(e) {
  document.getElementById('err').style.display='block';
  document.getElementById('err').textContent += '\nAPP ERROR: ' + e.message + '\n' + (e.stack||'').slice(0,400);
}
</script>
</body>
</html>
