    sp2Current = s.sp2;

      "Windfall": Math.round(windfallInc),
      Spending: spendingNominal,
      Travel: travelNominal,
      "Other income": otherInc,

      reserve: Math.round(reserve),
      contingency: Math.round(spendingNominal * 0.15),
      hasTripThisYear: tripExtra > 0,
      hasWindfallThisYear: windfallInc > 0,
      otherInc: otherInc,
      tripCost: tripExtra,
      windfallInc: Math.round(windfallInc),
      pensionLocked: !pensionAccessible,
      lateRetire,
      careCost: lateRetire ? Math.round((s.careCost || 8000) * inf) : 0

    pot,
    isa,
    savings,
    travelTotal,
    travelAfterDiscount,
    flexDiscount,
    totalSpend,
