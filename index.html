<title>Retirement & Travel Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F7F6F3; color: #2C3E50; padding-bottom: 40px; }
#root { min-height: 100vh; padding: 16px; max-width: 1200px; margin: 0 auto; }
.tabs-strip { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 4px 0 12px; margin-bottom: 16px; border-bottom: 1px solid #E5E7EB; }
.tabs-strip::-webkit-scrollbar { display: none; }
.tab-btn { padding: 8px 16px; background: #E5E7EB; border: none; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; color: #4B5563; white-space: nowrap; transition: all 0.2s; }
.tab-btn.active { background: #2C5F8A; color: white; }
.card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #E5E7EB; }
.card h2 { font-size: 18px; margin-bottom: 16px; color: #2C5F8A; display: flex; align-items: center; gap: 8px; }
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: #4B5563; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; color: #1F2937; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #2C5F8A; outline: none; box-shadow: 0 0 0 3px rgba(44,95,138,0.1); }
.btn { background: #2C5F8A; color: white; border: none; padding: 10px 18px; font-weight: 600; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; }
.btn-secondary { background: #E5E7EB; color: #4B5563; }
.btn-danger { background: #DC2626; color: white; }
.sub-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.sub-tab-btn { padding: 6px 12px; background: transparent; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
.sub-tab-btn.active { background: #F3F4F6; border-color: #4B5563; font-weight: 600; }

/* Calendar Styling */
.calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; background: #2C5F8A; color: white; padding: 12px; border-radius: 8px; }
.calendar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 768px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .calendar-grid { grid-template-columns: 1fr; } }
.month-box { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 10px; min-height: 110px; }
.month-name { font-weight: bold; border-bottom: 1px solid #E5E7EB; padding-bottom: 4px; margin-bottom: 6px; font-size: 14px; color: #4B5563; }
.cal-trip-block { font-size: 11px; padding: 4px 6px; border-radius: 4px; margin-bottom: 4px; color: white; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Trip List & Cards */
.trip-card { border-left: 5px solid #2C5F8A; position: relative; }
.trip-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
.budget-badge { background: #EFF6FF; color: #1E40AF; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.budget-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; background: #F9FAFB; padding: 8px; border-radius: 6px; }
.budget-cell { font-size: 12px; }
.budget-cell span { display: block; font-weight: bold; font-size: 14px; }

#save-toast { position: fixed; bottom: 20px; right: 16px; background: #1B5E42; color: #fff; font-size: 12px; font-weight: 600; padding: 8px 14px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
#save-toast.show { opacity: 1; }
#err { position: fixed; top: 0; left: 0; right: 0; background: #7a1e1e; color: #fff; font-size: 12px; font-family: monospace; padding: 12px; z-index: 99999; white-space: pre-wrap; word-break: break-all; max-height: 40vh; overflow-y: auto; display: none; }
</style>
</head>
<body>
<div id="err"></div>
<div id="root"></div>
<div id="save-toast">&#10003; Saved Changes</div>

<script>
// Mock Minimalistic State Engine & Store Engine combined
const APP_STORAGE_KEY = 'retirement_travel_planner_data_v2';

let state = {
    activeTab: 'baseline',
    baselineSubTab: 'general',
    calendarYear: 2026,
    baseline: {
        retirementAge: 60,
        currentAge: 45,
        currentSavings: 150000,
        monthlyContribution: 150000,
        oneOffIncome: 25000,
        annualReturn: 5,
        inflationRate: 2
    },
    trips: [
        { id: '1', name: 'Spain Road Trip', year: 2026, startMonth: 5, endMonth: 6, budget: 4000, actual: 3850, notes: 'Covered Barcelona, Madrid, and Murcia.', color: '#3B82F6' },
        { id: '2', name: 'China Explorer', year: 2026, startMonth: 9, endMonth: 9, budget: 6000, actual: 6400, notes: 'Beijing, Chengdu, Xi\'an.', color: '#EF4444' }
    ]
};

// Load initial data if existing
const stored = localStorage.getItem(APP_STORAGE_KEY);
if (stored) {
    try {
        state = { ...state, ...JSON.parse(stored) };
    } catch(e) { console.error("Error parsing stored data", e); }
}

function saveState() {
    localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(state));
    const toast = document.getElementById('save-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
    render();
}

const monthsList = [
    "January", "February", "March", "April", "May", "June", 
    "July", "August", "September", "October", "November", "December"
];

function updateBaseline(key, val) {
    state.baseline[key] = parseFloat(val) || 0;
    saveState();
}

function addTrip() {
    const newTrip = {
        id: Date.now().toString(),
        name: 'New Custom Trip',
        year: state.calendarYear,
        startMonth: 1,
        endMonth: 1,
        budget: 2000,
        actual: 0,
        notes: '',
        color: ['#3B82F6', '#EF4444', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899'][Math.floor(Math.random() * 6)]
    };
    state.trips.push(newTrip);
    saveState();
}

function updateTrip(id, key, val) {
    const trip = state.trips.find(t => t.id === id);
    if(trip) {
        if(key === 'budget' || key === 'actual' || key === 'year' || key === 'startMonth' || key === 'endMonth') {
            trip[key] = parseFloat(val) || 0;
        } else {
            trip[key] = val;
        }
        saveState();
    }
}

function deleteTrip(id) {
    state.trips = state.trips.filter(t => t.id !== id);
    saveState();
}

function render() {
    const root = document.getElementById('root');
    
    // Top Tab Strip
    let html = `
        <div class="tabs-strip">
            <button class="tab-btn ${state.activeTab === 'baseline' ? 'active' : ''}" onclick="state.activeTab='baseline'; render();">Baseline</button>
            <button class="tab-btn ${state.activeTab === 'trips' ? 'active' : ''}" onclick="state.activeTab='trips'; render();">Travel Planner</button>
            <button class="tab-btn ${state.activeTab === 'calendar' ? 'active' : ''}" onclick="state.activeTab='calendar'; render();">Calendar</button>
            <button class="tab-btn ${state.activeTab === 'dashboard' ? 'active' : ''}" onclick="state.activeTab='dashboard'; render();">Spending Summary</button>
        </div>
    `;

    if (state.activeTab === 'baseline') {
        html += `
            <div class="card">
                <h2>📊 Baseline Assumptions</h2>
                <div class="sub-tabs">
                    <button class="sub-tab-btn ${state.baselineSubTab === 'general' ? 'active' : ''}" onclick="state.baselineSubTab='general'; render();">General Params</button>
                    <button class="sub-tab-btn ${state.baselineSubTab === 'income' ? 'active' : ''}" onclick="state.baselineSubTab='income'; render();">Other Income</button>
                </div>
        `;
        
        if (state.baselineSubTab === 'general') {
            html += `
                <div class="grid-2">
                    <div class="form-group">
                        <label>Current Age</label>
                        <input type="number" value="${state.baseline.currentAge}" onchange="updateBaseline('currentAge', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Target Retirement Age</label>
                        <input type="number" value="${state.baseline.retirementAge}" onchange="updateBaseline('retirementAge', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Current Net Savings (£)</label>
                        <input type="number" value="${state.baseline.currentSavings}" onchange="updateBaseline('currentSavings', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Regular Annual Contribution (£)</label>
                        <input type="number" value="${state.baseline.monthlyContribution}" onchange="updateBaseline('monthlyContribution', this.value)">
                    </div>
                </div>
            `;
        } else {
            html += `
                <div class="grid-2">
                    <div class="form-group">
                        <label>One-off Income (Savings / Reinvestable Portfolio) (£)</label>
                        <input type="number" style="border-color: #10B981;" value="${state.baseline.oneOffIncome || 0}" onchange="updateBaseline('oneOffIncome', this.value)">
                        <p style="font-size:11px; color:#6B7280; margin-top:4px;">*Streams explicitly directly into total baseline calculated wealth pool accumulation strategy.</p>
                    </div>
                    <div class="form-group">
                        <label>Expected Investment Return (%)</label>
                        <input type="number" value="${state.baseline.annualReturn}" onchange="updateBaseline('annualReturn', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Expected Inflation rate (%)</label>
                        <input type="number" value="${state.baseline.inflationRate}" onchange="updateBaseline('inflationRate', this.value)">
                    </div>
                </div>
            `;
        }
        html += `</div>`;
        
    } else if (state.activeTab === 'trips') {
        html += `
            <div style="margin-bottom: 16px; display:flex; justify-content: space-between; align-items:center;">
                <h2 style="font-size: 18px; color: #2C5F8A;">✈️ Managed Ventures & Trips</h2>
                <button class="btn" onclick="addTrip()">➕ Add Trip Card</button>
            </div>
            <div class="grid-2">
        `;
        
        state.trips.forEach(trip => {
            const overUnder = trip.budget - trip.actual;
            const dynamicColor = overUnder >= 0 ? '#10B981' : '#DC2626';
            
            html += `
                <div class="card trip-card" style="border-left-color: ${trip.color};">
                    <div class="trip-header">
                        <div style="width: 100%;">
                            <input type="text" value="${trip.name}" onchange="updateTrip('${trip.id}', 'name', this.value)" style="font-weight:bold; font-size:16px; border:none; border-bottom:1px solid #E5E7EB; padding: 2px 0; margin-bottom:6px; width:90%;">
                        </div>
                        <button class="btn-secondary" style="border:none; background:transparent; cursor:pointer; color:#9CA3AF;" onclick="deleteTrip('${trip.id}')">❌</button>
                    </div>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-bottom:12px;">
                        <div class="form-group">
                            <label>Year</label>
                            <input type="number" value="${trip.year}" onchange="updateTrip('${trip.id}', 'year', this.value)">
                        </div>
                        <div class="form-group">
                            <label>Start Month</label>
                            <select onchange="updateTrip('${trip.id}', 'startMonth', this.value)">
                                ${monthsList.map((m, idx) => `<option value="${idx+1}" ${trip.startMonth === idx+1 ? 'selected' : ''}>${m.substring(0,3)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>End Month</label>
                            <select onchange="updateTrip('${trip.id}', 'endMonth', this.value)">
                                ${monthsList.map((m, idx) => `<option value="${idx+1}" ${trip.endMonth === idx+1 ? 'selected' : ''}>${m.substring(0,3)}</option>`).join('')}
                            </select>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:12px;">
                        <div class="form-group">
                            <label>Budget (£)</label>
                            <input type="number" value="${trip.budget}" onchange="updateTrip('${trip.id}', 'budget', this.value)">
                        </div>
                        <div class="form-group">
                            <label>Actual Spend (£)</label>
                            <input type="number" value="${trip.actual}" onchange="updateTrip('${trip.id}', 'actual', this.value)">
                        </div>
                    </div>

                    <div class="budget-row">
                        <div class="budget-cell">Budget: <span>£${trip.budget}</span></div>
                        <div class="budget-cell">Actual: <span>£${trip.actual}</span></div>
                        <div class="budget-cell">Variance: <span style="color: ${dynamicColor}">${overUnder >= 0 ? '+' : ''}£${overUnder}</span></div>
                    </div>

                    <div class="form-group" style="margin-top:12px;">
                        <label>Trip Execution Notes</label>
                        <textarea placeholder="Log dynamic updates, routes, bookings..." rows="2" onchange="updateTrip('${trip.id}', 'notes', this.value)">${trip.notes || ''}</textarea>
                    </div>
                </div>
            `;
        });
        
        if(state.trips.length === 0) {
            html += `<p style="color:#6B7280; font-size:14px;">No active trips added yet. Press add card above.</p>`;
        }
        
        html += `</div>`;
        
    } else if (state.activeTab === 'calendar') {
        html += `
            <div class="card">
                <div class="calendar-header">
                    <button class="tab-btn" style="background:rgba(255,255,255,0.2); color:white;" onclick="state.calendarYear--; render();">◀</button>
                    <h2 style="margin:0; color:white; font-size:20px;">📅 Year Grid: ${state.calendarYear}</h2>
                    <button class="tab-btn" style="background:rgba(255,255,255,0.2); color:white;" onclick="state.calendarYear++; render();">▶</button>
                </div>
                
                <div class="calendar-grid">
        `;
        
        for(let mIdx = 1; mIdx <= 12; mIdx++) {
            const currentMonthTrips = state.trips.filter(t => t.year === state.calendarYear && mIdx >= t.startMonth && mIdx <= t.endMonth);
            
            html += `
                <div class="month-box">
                    <div class="month-name">${monthsList[mIdx-1]}</div>
                    <div style="margin-top:6px;">
                        ${currentMonthTrips.map(t => `
                            <div class="cal-trip-block" style="background:${t.color};" title="${t.name}">
                                🧳 ${t.name}
                            </div>
                        `).join('')}
                        ${currentMonthTrips.length === 0 ? '<span style="color:#D1D5DB; font-size:11px; font-style:italic;">No departures</span>' : ''}
                    </div>
                </div>
            `;
        }
        
        html += `
                </div>
            </div>
        `;
        
    } else if (state.activeTab === 'dashboard') {
        let totalBudget = 0;
        let totalActual = 0;
        state.trips.forEach(t => {
            totalBudget += t.budget;
            totalActual += t.actual;
        });
        
        const netVariance = totalBudget - totalActual;
        const totalWealthPool = (state.baseline.currentSavings || 0) + (state.baseline.oneOffIncome || 0);
        
        html += `
            <div class="card">
                <h2>📊 Financial Metrics & Spending Summary</h2>
                <div class="budget-row" style="padding:16px; margin-bottom:20px;">
                    <div class="budget-cell" style="font-size:14px;">Combined Trip Budget: <span style="font-size:22px; color:#2C5F8A;">£${totalBudget}</span></div>
                    <div class="budget-cell" style="font-size:14px;">Total Portfolio Spend: <span style="font-size:22px; color:#1F2937;">£${totalActual}</span></div>
                    <div class="budget-cell" style="font-size:14px;">Net Variance Strategy: <span style="font-size:22px; color:${netVariance >= 0 ? '#10B981' : '#DC2626'};">${netVariance >= 0 ? 'Under' : 'Over'} Budget (£${Math.abs(netVariance)})</span></div>
                </div>

                <div style="background:#F3F4F6; padding:14px; border-radius:8px; margin-bottom:15px;">
                    <h4 style="font-size:14px; margin-bottom:6px; color:#4B5563;">Liquid Base Injection Sync</h4>
                    <p style="font-size:13px;">Initial Capital Base + Strategic One-off Injections combined yield starting milestone: <strong>£${totalWealthPool}</strong></p>
                </div>

                <h3 style="font-size:15px; margin-bottom:10px; font-weight:600; color:#4B5563;">Pattern Recognition Insights</h3>
                <ul style="padding-left:20px; font-size:13px; color:#4B5563; line-height:1.6;">
                    <li>Your travel operations run at a net <strong>${netVariance >= 0 ? 'Surplus' : 'Deficit'}</strong> profile of £${Math.abs(netVariance)}.</li>
                    <li>One-off asset tracking shows £${state.baseline.oneOffIncome || 0} successfully marked inside reinvestable reserves buffer safely mitigating downstream deviation risks.</li>
                </ul>
            </div>
        `;
    }

    root.innerHTML = html;
}

// Global initialization trigger
setTimeout(render, 50);
</script>
</body>
</html>
