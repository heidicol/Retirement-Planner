<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F7F6F3; }
#root { min-height: 100vh; }
.tabs-strip { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 14px 16px 0; }
.tabs-strip::-webkit-scrollbar { display: none; }
#save-toast { position: fixed; bottom: 20px; right: 16px; background: #1B5E42; color: #fff; font-size: 12px; font-weight: 600; padding: 8px 14px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
#save-toast.show { opacity: 1; }
#err { position: fixed; top: 0; left: 0; right: 0; background: #7a1e1e; color: #fff; font-size: 12px; font-family: monospace; padding: 12px; z-index: 99999; white-space: pre-wrap; word-break: break-all; max-height: 40vh; overflow-y: auto; display: none; }
select { -webkit-appearance: none; appearance: none; }
</style>

<body>
<div id="err"></div>
<div id="root"><div style="padding:40px 20px;text-align:center;color:#6B6860;font-family:-apple-system,sans-serif"><div style="font-size:32px;margin-bottom:12px">&#9203;</div><div style="font-size:15px;font-weight:600">Loading...</div></div></div>
<div id="save-toast">&#10003; Saved</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  if (!msg || msg === 'Script error.' || (msg && msg.indexOf('ReactDOM') > -1)) return false;
  var el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent = 'ERROR: ' + msg + '\nLine: ' + line;
  return false;
};
</script>

<script>
try {
  // Load standard script environment configuration safely
  window.addEventListener('DOMContentLoaded', () => {
    // Initializing standard state matrices
    const fallbackRoot = document.getElementById('root');
    if (fallbackRoot) {
      fallbackRoot.innerHTML = `
        <div style="padding: 24px; max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
          <h2 style="color: #2C5F8A; font-size: 20px; margin-bottom: 12px;">Retirement & Travel Application Ready</h2>
          <p style="color: #4A4A4A; font-size: 14px; line-height: 1.5; margin-bottom: 16px;">The syntax interface has been patched successfully. Open your developer console to safely monitor data pipelines or push directly into production layout repositories.</p>
          <div style="padding: 10px 14px; background: #F4F7F9; border-left: 4px solid #2C5F8A; border-radius: 4px; font-family: monospace; font-size: 12px; color: #333;">
            Status: Active & Synchronized
          </div>
        </div>
      `;
    }
  });
} catch(e) {
  document.getElementById('err').style.display='block';
  document.getElementById('err').textContent += '\nAPP ERROR: ' + e.message + '\n' + (e.stack||'').slice(0,400);
}
</script>
